name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-1
  ECR_API: nestmono-api
  ECR_WEB: nestmono-web
  ECS_CLUSTER: nestmono-cluster
  ECS_API_SERVICE: nestmono-api
  ECS_WEB_SERVICE: nestmono-web

jobs:
  build-push:
    name: Build & push images
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.meta.outputs.sha }}
      alb_dns: ${{ steps.meta.outputs.alb_dns }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute metadata
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          ALB_DNS=$(aws elbv2 describe-load-balancers \
            --names nestmono-alb \
            --query 'LoadBalancers[0].DNSName' --output text)
          echo "alb_dns=$ALB_DNS" >> $GITHUB_OUTPUT
          echo "ALB: $ALB_DNS"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_API }}:latest
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_API }}:${{ steps.meta.outputs.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build & push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=http://${{ steps.meta.outputs.alb_dns }}
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_WEB }}:latest
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_WEB }}:${{ steps.meta.outputs.sha }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  deploy:
    name: Deploy to ECS
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Force new deployment (api + web)
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" --service "$ECS_API_SERVICE" \
            --force-new-deployment --no-cli-pager > /dev/null
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" --service "$ECS_WEB_SERVICE" \
            --force-new-deployment --no-cli-pager > /dev/null

      - name: Wait for services to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_API_SERVICE" "$ECS_WEB_SERVICE"

      - name: Summary
        run: |
          echo "Deployed \`${{ needs.build-push.outputs.sha }}\` → http://${{ needs.build-push.outputs.alb_dns }}" >> $GITHUB_STEP_SUMMARY
